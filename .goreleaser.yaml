# GoReleaser configuration for spore-host/spore-host-mcp
version: 2

builds:
  - id: spore-host-mcp
    main: .
    binary: spore-host-mcp
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.Version={{.Version}}
    mod_timestamp: '{{ .CommitTimestamp }}'

archives:
  - id: spore-host-mcp-archive
    name_template: 'spore-host-mcp_{{ .Version }}_{{ .Os }}_{{ .Arch }}'
    files:
      - LICENSE*

checksum:
  name_template: 'checksums.txt'

# Publisher-authenticate the release with keyless cosign (Sigstore). We sign the
# checksums.txt — it lists the SHA-256 of every archive/package, so one signature
# transitively authenticates all artifacts (verify the checksum's signature, then
# each file against checksums.txt). Keyless uses the release workflow's GitHub OIDC
# identity via Fulcio/Rekor — no long-lived key to manage or leak.
#
# cosign 3.x emits the modern Sigstore bundle (`--bundle`, bundling signature +
# Fulcio cert + Rekor entry); the old --output-signature/--output-certificate are
# gone. Publishes checksums.txt.bundle. Requires `id-token: write` + cosign on PATH.
# Verify with `cosign verify-blob --bundle` (see docs: "Verify a download").
signs:
  - cmd: cosign
    signature: '${artifact}.bundle'
    args:
      - sign-blob
      - '--bundle=${signature}'
      - '${artifact}'
      - '--yes'
    artifacts: checksum
    output: true

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: Others
      order: 999

nfpms:
  - package_name: spore-host-mcp
    vendor: spore.host
    homepage: https://spore.host
    maintainer: "spore.host <hello@spore.host>"
    description: "MCP server for AI assistants — manage EC2 instances and discover capacity"
    license: Apache-2.0
    formats:
      - deb
      - rpm
    file_name_template: "{{ .PackageName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    contents:
      - src: LICENSE
        dst: /usr/share/doc/spore-host-mcp/copyright
        type: doc
    rpm:
      summary: "MCP server for AI assistants — manage EC2 instances and discover capacity"

brews:
  - name: spore-host-mcp
    repository:
      owner: spore-host
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: https://github.com/spore-host/spore-host-mcp
    description: "MCP server for AI assistants — manage EC2 instances and discover capacity"
    license: Apache-2.0
    install: |
      bin.install "spore-host-mcp"

scoops:
  - name: spore-host-mcp
    repository:
      owner: spore-host
      name: scoop-bucket
      branch: main
      token: "{{ .Env.SCOOP_BUCKET_GITHUB_TOKEN }}"
    directory: bucket
    homepage: https://github.com/spore-host/spore-host-mcp
    description: "MCP server for AI assistants — manage EC2 instances and discover capacity"
    license: Apache-2.0

release:
  github:
    owner: spore-host
    name: spore-host-mcp
  draft: false
  prerelease: auto
  mode: replace
  name_template: "v{{.Version}}"
