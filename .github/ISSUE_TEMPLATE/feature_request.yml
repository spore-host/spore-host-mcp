name: Feature request
description: Suggest an enhancement for spore-host-mcp
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea for **spore-host-mcp** (MCP server for spore.host).
        Search existing issues first — someone may have proposed it already.
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: The use case or pain point motivating the request.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What you'd like to happen. Sketch the CLI/flag/behavior if you can.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
